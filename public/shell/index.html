<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Little Garden Arcade</title>
<meta name="theme-color" content="#fdf3da">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../icons/favicon-16.png">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="manifest" href="../manifest.json">
<link rel="stylesheet" href="shell.css">
<style>
  body { background: #fdf3da; }

  .stage { min-height: 100vh; min-height: 100dvh; justify-content: center; }

  .panel {
    width: 100%;
    max-width: 480px;
    background: #fffdf7;
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
    padding: clamp(28px, 7vw, 42px) clamp(20px, 6vw, 32px) clamp(24px, 6vw, 36px);
  }

  .stage h1 {
    font-family: 'Quicksand', var(--font-body);
    font-weight: 700;
    font-size: clamp(28px, 8vw, 38px);
    color: #2c3a26;
    letter-spacing: -.01em;
    margin: 0;
  }

  .stage .sub {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: clamp(16px, 4vw, 21px);
    color: #6b7a3f;
    margin: 6px 0 0;
  }

  .flourish {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 14px 0 2px;
    font-size: 18px;
  }
  .flourish span:nth-child(1), .flourish span:nth-child(3) { color: #ffd76b; }
  .flourish span:nth-child(2) { color: #ff9eb6; }

  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%;
    margin: 22px 0 0;
  }
  @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }

  .tile {
    --press-scale: .97;
    --tilt: 0deg;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    border-radius: 16px 22px 16px 24px;
    box-shadow: 0 4px 0 rgba(0, 0, 0, .09), 0 8px 16px rgba(0, 0, 0, .06);
    padding: 26px 12px 20px;
    text-decoration: none;
    transform: rotate(var(--tilt));
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .tile:hover, .tile:focus-visible {
    transform: translateY(-3px) rotate(var(--tilt));
    box-shadow: 0 7px 0 rgba(0, 0, 0, .09), 0 14px 22px rgba(0, 0, 0, .09);
  }
  .tile:active { transform: scale(var(--press-scale)) rotate(var(--tilt)); }
  .tile:focus-visible { outline: 3px solid var(--garden-accent); outline-offset: 3px; }

  .grid .tile:nth-child(1) { --tilt: -1.3deg; background: #ffd76b; color: #3d2f0a; }
  .grid .tile:nth-child(2) { --tilt: 1.3deg; background: #ff9eb6; color: #4a1424; }
  .grid .tile:nth-child(3) { --tilt: -1deg; }
  .grid .tile:nth-child(4) { --tilt: 1deg; }
  .grid .tile:nth-child(1) .icon { background: #fff2cf; }
  .grid .tile:nth-child(2) .icon { background: #ffe0e8; }
  .grid .tile:nth-child(1) .desc { color: #6b581e; }
  .grid .tile:nth-child(2) .desc { color: #7a3348; }

  .tile.soon { background: #e4e0d4; color: #5c5640; }
  .tile.soon .icon { background: #f2efe4; opacity: .85; }
  .tile.soon .desc { color: #8a8265; }

  .tile .badge {
    position: absolute; top: 12px; right: 12px;
    background: #fff; color: #8a8265;
    font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: .04em;
    padding: 4px 10px; border-radius: 20px;
  }

  .tile .icon {
    width: 93px; height: 93px;
    display: flex; align-items: center; justify-content: center;
    font-size: 49px; line-height: 1;
    border-radius: 50%;
    margin: 0;
    transition: transform .2s cubic-bezier(.34, 1.56, .64, 1);
  }
  /* the tile's own scale-down already shrinks everything inside it,
     so compensate here to land on a true 1.05x icon size relative to
     its unpressed size, not 1.05x of the already-shrunk tile */
  .tile:active .icon { transform: scale(calc(1.05 / var(--press-scale))); }
  .tile .name {
    font-family: 'Quicksand', var(--font-body);
    font-weight: 700;
    font-size: 24px;
    text-align: center;
  }
  .tile .desc { font-family: var(--font-body); font-weight: 700; font-size: 16px; text-align: center; }

  .tile.soon { pointer-events: none; }
</style>
</head>
<body>
<div class="stage">
  <div class="panel">
    <h1>The Little Garden Arcade</h1>
    <p class="sub">Pick a game to play</p>
    <div class="flourish" aria-hidden="true"><span>&#10022;</span><span>&#10022;</span><span>&#10022;</span></div>

    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
  // Tiles are rendered from games.json - add a new game there and a tile
  // appears automatically, no code change needed here.
  fetch('../games.json')
    .then(res => {
      if (!res.ok) throw new Error(`Failed to load games.json: ${res.status}`);
      return res.json();
    })
    .then(({ games }) => {
      const grid = document.getElementById('grid');
      games.forEach(g => {
        const el = document.createElement(g.status === 'ready' ? 'a' : 'div');
        el.className = g.status === 'ready' ? 'tile' : 'tile soon';
        if (g.status === 'ready') el.href = g.path;

        const icon = document.createElement('span');
        icon.className = 'icon';
        icon.textContent = g.icon;
        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = g.name;
        const desc = document.createElement('span');
        desc.className = 'desc';
        desc.textContent = g.desc;
        el.append(icon, name, desc);

        if (g.status !== 'ready') {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'SOON';
          el.appendChild(badge);
        }

        grid.appendChild(el);
      });
    })
    .catch(() => {
      document.getElementById('grid').textContent = "Couldn't load the games list. Check your connection and try reloading.";
    });
</script>
<script type="module" src="../shared/register-sw.js"></script>
</body>
</html>
