<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nanny's Sprout Pop</title>
<meta name="theme-color" content="#fdf3da">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/png" sizes="32x32" href="../../icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../icons/favicon-16.png">
<link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../shell/shell.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stage">
  <div class="panel">
    <a href="../../shell/" class="home-btn" aria-label="Back to the game hub">🏠</a>
    <h1>Nanny's Sprout Pop 🌱</h1>
    <p class="sub">Tap the sprouts to give them a drink</p>
    <div class="flourish" aria-hidden="true"><span>&#10022;</span><span>&#10022;</span><span>&#10022;</span></div>

    <div class="hud">
      <span class="timer" id="timer">0:30</span>
      <span class="score" id="score">Watered: 0</span>
    </div>

    <div class="mounds" id="mounds"></div>

    <div class="footer">
      <span class="progress">Quick, water them before they hide!</span>
      <button class="reset-btn" id="resetBtn">Start over</button>
    </div>
  </div>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-card">
    <div style="font-size:44px;">🌱💧🌼</div>
    <h2>Time's up!</h2>
    <p id="endMessage" style="color:var(--garden-ink-soft);">You watered some sprouts.</p>
    <button id="playAgainBtn">Play again</button>
  </div>
</div>

<script type="module" src="game.js"></script>
<script type="module" src="../../shared/register-sw.js"></script>
</body>
</html>
