<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nanny's Petal Catch</title>
<meta name="theme-color" content="#cfe8f5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/png" sizes="32x32" href="../../icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../icons/favicon-16.png">
<link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../shell/shell.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stage">
  <div class="panel">
    <h1>Nanny's Petal Catch 🌸</h1>
    <p class="sub">Tap a lane to move the basket and catch the petals</p>
    <div class="flourish" aria-hidden="true"><span>&#10022;</span><span>&#10022;</span><span>&#10022;</span></div>

    <div class="hud">
      <span class="lives" id="lives"></span>
      <span class="score" id="score">Caught: 0</span>
    </div>

    <div class="play-area" id="playArea">
      <div class="lanes" id="lanes"></div>
      <div class="basket" id="basket">🧺</div>
    </div>

    <div class="footer">
      <span class="progress">Don't let them hit the ground!</span>
      <button class="reset-btn" id="resetBtn">Start over</button>
    </div>
  </div>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-card">
    <div style="font-size:44px;">🌸🧺💛</div>
    <h2 id="endTitle">Out of hearts!</h2>
    <p id="endMessage" style="color:var(--garden-ink-soft);">You caught some petals.</p>
    <button id="playAgainBtn">Play again</button>
  </div>
</div>

<script type="module" src="game.js"></script>
<script type="module" src="../../shared/register-sw.js"></script>
</body>
</html>
