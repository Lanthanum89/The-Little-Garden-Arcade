<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nanny's Colouring Garden</title>
<meta name="theme-color" content="#eef3e6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="../../manifest.json">
<link rel="stylesheet" href="../../shell/shell.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stage">
  <h1>Nanny's Colouring Garden 🎨</h1>
  <p class="sub">Pick a colour, then tap a part of the picture</p>

  <div class="canvas-wrap">
    <svg id="scene" viewBox="0 0 300 300">
      <!-- sky -->
      <rect id="sky" x="0" y="0" width="300" height="180" fill="#ffffff"/>
      <!-- sun -->
      <circle id="sun" cx="250" cy="50" r="28" fill="#ffffff"/>
      <!-- ground -->
      <rect id="ground" x="0" y="180" width="300" height="120" fill="#ffffff"/>
      <!-- house body -->
      <rect id="house" x="60" y="140" width="100" height="80" fill="#ffffff"/>
      <!-- roof -->
      <path id="roof" d="M50 140 L110 95 L170 140 Z" fill="#ffffff"/>
      <!-- door -->
      <rect id="door" x="95" y="175" width="30" height="45" fill="#ffffff"/>
      <!-- flower 1 -->
      <circle id="flower1" cx="210" cy="220" r="16" fill="#ffffff"/>
      <!-- flower 2 -->
      <circle id="flower2" cx="240" cy="240" r="14" fill="#ffffff"/>
      <!-- flower stem (not fillable, decorative) -->
      <line x1="210" y1="236" x2="210" y2="270" stroke="#7da35c" stroke-width="3"/>
      <line x1="240" y1="254" x2="240" y2="275" stroke="#7da35c" stroke-width="3"/>
    </svg>
  </div>

  <div class="palette" id="palette"></div>

  <div class="footer">
    <button class="reset-btn" id="resetBtn">Clear colours</button>
  </div>
</div>

<script type="module" src="game.js"></script>
<script type="module" src="../../shared/register-sw.js"></script>
</body>
</html>
